# The app defaults to a fixed dark theme (a single [theme] table forces it,
# regardless of the viewer's OS/browser color scheme). Viewers can still switch
# to light from the ⋮ menu → Settings → Theme. Plotly charts read
# st.context.theme and follow whichever theme is active.
[theme]
base = "dark"
primaryColor = "#5B8DEF"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#1A1F2B"
textColor = "#E6EAF1"
font = "sans serif"

[server]
runOnSave = true
